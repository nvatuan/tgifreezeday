apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: tgifreezeday-vault-connection
spec:
  address: https://vault.vault.svc.cluster.local
  skipTLSVerify: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: tgifreezeday-vault-auth
spec:
  vaultConnectionRef: tgifreezeday-vault-connection
  namespace: tgifreezeday
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: tgifreezeday-k8s-auth
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: tgifreezeday-secrets
spec:
  vaultAuthRef: tgifreezeday-vault-auth
  mount: secret
  type: kv-v2
  path: tgifreezeday/secrets

  refreshAfter: 60s

  destination:
    name: tgifreezeday-secrets   # K8s Secret that Vault will create/own
    create: true
    transformation:
      # Strip the TGIFD_ prefix: each template reads the prefixed Vault key
      # and writes it under the unprefixed name the app expects.
      templates:
        GOOGLE_OAUTH_CLIENT_ID:
          text: '{{ get .Secrets "TGIFD_GOOGLE_OAUTH_CLIENT_ID" }}'
        GOOGLE_OAUTH_CLIENT_SECRET:
          text: '{{ get .Secrets "TGIFD_GOOGLE_OAUTH_CLIENT_SECRET" }}'
        SESSION_SECRET:
          text: '{{ get .Secrets "TGIFD_SESSION_SECRET" }}'
        POWER_USER_EMAIL_LIST:
          text: '{{ get .Secrets "TGIFD_POWER_USER_EMAIL_LIST" }}'
        WRITE_USER_EMAIL_LIST:
          text: '{{ get .Secrets "TGIFD_WRITE_USER_EMAIL_LIST" }}'
      # Exclude the raw TGIFD_* keys from the resulting K8s Secret so only
      # the remapped keys are present.
      excludes:
        - "^TGIFD_.*"
